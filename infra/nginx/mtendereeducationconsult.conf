server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.mtendereeducationconsult.com;

  ssl_certificate /etc/letsencrypt/live/mtendereeducationconsult.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mtendereeducationconsult.com/privkey.pem;

  client_max_body_size 25m;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location ~* "(\.env|\.git|\.svn|\.hg|\.DS_Store|Thumbs\.db|package(-lock)?\.json|pnpm-lock\.yaml|yarn\.lock|tsconfig\.json|vite\.config\.(ts|js)|drizzle\.config\.(ts|js)|vercel\.json|render\.yaml|ecosystem\.config\.cjs|server-build|node_modules|/server/|/shared/|/client/src|/Admin/server|/migrations/|/scripts/|/logs/|/data/|\.map$|wp-admin|wp-login\.php|xmlrpc\.php|phpmyadmin|cgi-bin|vendor/phpunit|composer\.(json|lock)|\.php$|\.asp$|\.aspx$|\.jsp$|etc/passwd|proc/self|actuator|solr|boaform|debug/default)" {
    return 404;
  }

  location ~ ^/(api/)?auth/(login|register|forgot-password|reset-password|resend-verification|change-verification-email) {
    limit_req zone=mec_auth burst=20 nodelay;
    proxy_pass http://127.0.0.1:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 30s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
  }

  location /ws {
    proxy_pass http://127.0.0.1:5000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location / {
    limit_req zone=mec_api burst=240 nodelay;
    proxy_pass http://127.0.0.1:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 30s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
  }
}
