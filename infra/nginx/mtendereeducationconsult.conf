map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

limit_req_zone $binary_remote_addr zone=mec_api:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=mec_auth:10m rate=10r/m;

server {
  listen 80;
  listen [::]:80;
  server_name mtendereeducationconsult.com admin.mtendereeducationconsult.com api.mtendereeducationconsult.com;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name mtendereeducationconsult.com;

  root /var/www/mec/dist/client;
  index index.html;

  ssl_certificate /etc/letsencrypt/live/mtendereeducationconsult.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mtendereeducationconsult.com/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.mtendereeducationconsult.com wss://api.mtendereeducationconsult.com; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://api.mtendereeducationconsult.com" always;

  location ~* "(\.env|\.git|\.svn|\.hg|\.DS_Store|Thumbs\.db|package(-lock)?\.json|pnpm-lock\.yaml|yarn\.lock|tsconfig\.json|vite\.config\.(ts|js)|drizzle\.config\.(ts|js)|vercel\.json|render\.yaml|ecosystem\.config\.cjs|server-build|node_modules|/server/|/shared/|/client/src|/Admin/server|/migrations/|/scripts/|/logs/|/data/|\.map$|wp-admin|wp-login\.php|xmlrpc\.php|phpmyadmin|cgi-bin|vendor/phpunit|composer\.(json|lock)|\.php$|\.asp$|\.aspx$|\.jsp$|etc/passwd|proc/self|actuator|solr|boaform|debug/default)" {
    return 404;
  }

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

