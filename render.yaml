services:
  - type: web
    name: mtendere-education-platform
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PUBLIC_APP_URL
        value: https://www.mtendereeducationconsult.com
      - key: FRONTEND_URL
        value: https://www.mtendereeducationconsult.com
      - key: ADMIN_APP_URL
        value: https://admin.mtendereeducationconsult.com
      - key: API_APP_URL
        value: https://api.mtendereeducationconsult.com
      - key: VITE_SITE_URL
        value: https://www.mtendereeducationconsult.com
      - key: VITE_API_URL
        value: ""
      - key: CORS_ORIGIN
        value: https://www.mtendereeducationconsult.com,https://admin.mtendereeducationconsult.com
      - key: ALLOWED_ORIGINS
        value: https://www.mtendereeducationconsult.com,https://admin.mtendereeducationconsult.com
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
