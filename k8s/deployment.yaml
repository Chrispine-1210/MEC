apiVersion: apps/v1
kind: Deployment
metadata:
  name: mec-app
  namespace: mec
  labels:
    app: mec-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mec-app
  template:
    metadata:
      labels:
        app: mec-app
    spec:
      containers:
        - name: app
          image: ghcr.io/your-org/mec:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: mec-config
            - secretRef:
                name: mec-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
