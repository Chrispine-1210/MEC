apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mec-app
  namespace: mec
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: mec.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mec-app
                port:
                  number: 80
