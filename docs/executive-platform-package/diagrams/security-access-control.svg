<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#0f172a"/>
  <text x="80" y="90" font-family="Aptos, Arial" font-size="42" font-weight="700" fill="#ffffff">Security and Access Control Model</text>
  <text x="80" y="132" font-family="Aptos, Arial" font-size="22" fill="#cbd5e1">Layered controls protecting identity, API access, admin operations, uploads, and data actions</text>
  <g font-family="Aptos, Arial">
    <rect x="140" y="220" width="1320" height="76" rx="18" fill="#2563eb" opacity="0.22" stroke="#2563eb"/><text x="188" y="254" font-size="24" font-weight="700" fill="#ffffff">Identity</text><text x="520" y="254" font-size="22" fill="#e2e8f0">bcrypt passwords, JWT tokens, session refresh</text><rect x="140" y="330" width="1320" height="76" rx="18" fill="#059669" opacity="0.22" stroke="#059669"/><text x="188" y="364" font-size="24" font-weight="700" fill="#ffffff">Authorization</text><text x="520" y="364" font-size="22" fill="#e2e8f0">viewer, editor, admin, super_admin routes</text><rect x="140" y="440" width="1320" height="76" rx="18" fill="#f59e0b" opacity="0.22" stroke="#f59e0b"/><text x="188" y="474" font-size="24" font-weight="700" fill="#ffffff">API Defense</text><text x="520" y="474" font-size="22" fill="#e2e8f0">rate limits, origin checks, Helmet CSP, validation</text><rect x="140" y="550" width="1320" height="76" rx="18" fill="#38bdf8" opacity="0.22" stroke="#38bdf8"/><text x="188" y="584" font-size="24" font-weight="700" fill="#ffffff">Admin Governance</text><text x="520" y="584" font-size="22" fill="#e2e8f0">roles, permissions, audit logs, settings controls</text><rect x="140" y="660" width="1320" height="76" rx="18" fill="#a3e635" opacity="0.22" stroke="#a3e635"/><text x="188" y="694" font-size="24" font-weight="700" fill="#ffffff">Data Operations</text><text x="520" y="694" font-size="22" fill="#e2e8f0">Drizzle schemas, upload governance, review workflow</text>
  </g>
</svg>