<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="80" y="90" font-family="Aptos, Arial" font-size="42" font-weight="700" fill="#111827">Strategic Roadmap</text>
  <text x="80" y="132" font-family="Aptos, Arial" font-size="22" fill="#475569">Hardening, operational intelligence, AI enablement, and regional scale</text>
  <g font-family="Aptos, Arial">
    <rect x="120" y="260" width="300" height="330" rx="22" fill="#ffffff" stroke="#cbd5e1"/><rect x="120" y="260" width="300" height="14" fill="#2563eb"/><text x="148" y="330" font-size="24" font-weight="700" fill="#2563eb">Phase 1</text><text x="148" y="376" font-size="28" font-weight="700" fill="#111827">Production hardening</text><text x="148" y="430" font-size="21" fill="#475569">Migrations, email envs, CI build checks, E2E coverage, upload scanning</text><rect x="490" y="260" width="300" height="330" rx="22" fill="#ffffff" stroke="#cbd5e1"/><rect x="490" y="260" width="300" height="14" fill="#059669"/><text x="518" y="330" font-size="24" font-weight="700" fill="#059669">Phase 2</text><text x="518" y="376" font-size="28" font-weight="700" fill="#111827">Operations intelligence</text><text x="518" y="430" font-size="21" fill="#475569">Scheduled reporting, executive analytics, content approvals, CRM automation</text><rect x="860" y="260" width="300" height="330" rx="22" fill="#ffffff" stroke="#cbd5e1"/><rect x="860" y="260" width="300" height="14" fill="#f59e0b"/><text x="888" y="330" font-size="24" font-weight="700" fill="#f59e0b">Phase 3</text><text x="888" y="376" font-size="28" font-weight="700" fill="#111827">AI-assisted growth</text><text x="888" y="430" font-size="21" fill="#475569">Scholarship matching, student guidance, risk signals, partner insights</text><rect x="1230" y="260" width="300" height="330" rx="22" fill="#ffffff" stroke="#cbd5e1"/><rect x="1230" y="260" width="300" height="14" fill="#111827"/><text x="1258" y="330" font-size="24" font-weight="700" fill="#111827">Future</text><text x="1258" y="376" font-size="28" font-weight="700" fill="#111827">Regional ecosystem</text><text x="1258" y="430" font-size="21" fill="#475569">Multi-country operations, partner marketplace, school modules, monetization expansion</text>
  </g>
</svg>