<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Mtendere Education Platform</title>
    <meta name="application-name" content="Mtendere Education Platform" />
    <meta name="apple-mobile-web-app-title" content="Mtendere Education" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" type="image/png" href="/src/assets/imgs/Mtendere_Logo.png" />
    <link rel="apple-touch-icon" href="/src/assets/imgs/Mtendere_Logo.png" />
    <script>
      (() => {
        const adminHost = "admin.mtendereeducationconsult.com";
        const { hostname, pathname, search, hash } = window.location;
        if (hostname !== adminHost || pathname === "/admin" || pathname.startsWith("/admin/")) return;
        if (/^\/(?:api|uploads|media-assets)(?:\/|$)/.test(pathname) || pathname === "/ws" || pathname.startsWith("/auth/")) return;

        const nextPath = pathname === "/" ? "/admin" : pathname === "/auth" ? "/admin/auth" : `/admin${pathname}`;
        window.location.replace(`${nextPath}${search}${hash}`);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
